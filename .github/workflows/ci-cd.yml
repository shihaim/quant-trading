name: CI-CD

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  OWNER: ${{ github.repository_owner }}
  REPO: ${{ github.event.repository.name }}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Tests
        run: |
          pytest -q

  build_and_push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push ops-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ops-api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-ops-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-ops-api:latest
      - name: Build & Push trader
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.trader
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-trader:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-trader:latest
      - name: Build & Push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-web:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-web:latest

  deploy_local:
    needs: build_and_push
    runs-on: [self-hosted, quant-trading]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Write runtime env file (.env.runtime)
        shell: pwsh
        run: |
          $db = "${{ secrets.POSTGRES_DB }}"
          $user = "${{ secrets.POSTGRES_USER }}"
          $pass = "${{ secrets.POSTGRES_PASSWORD }}"
          $encodedUser = [uri]::EscapeDataString($user)
          $encodedPass = [uri]::EscapeDataString($pass)
          $databaseUrl = "postgresql+psycopg://$encodedUser`:$encodedPass@postgres:5432/$db"
          $envFile = ".env.runtime"
          @"
          GITHUB_OWNER=${{ github.repository_owner }}
          GITHUB_REPO=${{ github.event.repository.name }}
          IMAGE_TAG=latest
          POSTGRES_DB=$db
          POSTGRES_USER=$user
          POSTGRES_PASSWORD=$pass
          DATABASE_URL=$databaseUrl
          TRADE_MODE=${{ secrets.TRADE_MODE }}
          UPBIT_ACCESS_KEY=${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY=${{ secrets.UPBIT_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_API_BASE_URL=
          "@ | Out-File -FilePath $envFile -Encoding utf8 -Force
      - name: Login to GHCR (stable user)
        shell: pwsh
        run: |
          $patFile = Join-Path $env:RUNNER_TEMP "ghcr_pat.txt"
          Set-Content -Path $patFile -Value "${{ secrets.GHCR_PAT }}" -NoNewline
          Get-Content $patFile | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
      - name: Pull & Up
        shell: pwsh
        run: |
          docker compose --env-file .env.runtime pull
          docker compose --env-file .env.runtime up -d --remove-orphans
          docker image prune -f
      - name: Verify PostgreSQL bootstrap
        shell: pwsh
        run: |
          docker exec qt-postgres pg_isready -U "${{ secrets.POSTGRES_USER }}" -d "${{ secrets.POSTGRES_DB }}"
          docker exec qt-postgres psql -U "${{ secrets.POSTGRES_USER }}" -d "${{ secrets.POSTGRES_DB }}" -c "\dt"
