name: CI-CD

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  OWNER: ${{ github.repository_owner }}
  REPO: ${{ github.event.repository.name }}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Release Gate Report
        run: |
          python scripts/run_release_gate.py --output-dir .
      - name: Upload Release Gate Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-report
          path: |
            release_gate_report.json
            release_gate_report.md

  build_and_push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push ops-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ops-api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-ops-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-ops-api:latest
      - name: Build & Push trader
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.trader
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-trader:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-trader:latest
      - name: Build & Push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-web:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-web:latest
